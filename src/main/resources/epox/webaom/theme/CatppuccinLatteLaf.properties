#
# Catppuccin Latte — a soothing pastel light theme
# https://github.com/catppuccin/catppuccin
#
# Palette v1.8.0 — only overrides are listed; FlatLightLaf.properties provides
# the rest of the defaults and all derived-color expressions.
#

#---- Catppuccin Latte palette variables (for reference in expressions) ----

@catRosewater  = #dc8a78
@catFlamingo   = #dd7878
@catPink       = #ea76cb
@catMauve      = #8839ef
@catRed        = #d20f39
@catMaroon     = #e64553
@catPeach      = #fe640b
@catYellow     = #df8e1d
@catGreen      = #40a02b
@catTeal       = #179299
@catSky        = #04a5e5
@catSapphire   = #209fb5
@catBlue       = #1e66f5
@catLavender   = #7287fd
@catText       = #4c4f69
@catSubtext1   = #5c5f77
@catSubtext0   = #6c6f85
@catOverlay2   = #7c7f93
@catOverlay1   = #8c8fa1
@catOverlay0   = #9ca0b0
@catSurface2   = #acb0be
@catSurface1   = #bcc0cc
@catSurface0   = #ccd0da
@catBase       = #eff1f5
@catMantle     = #e6e9ef
@catCrust      = #dce0e8


#---- variables ----

@background           = @catBase
@foreground           = @catText
@disabledBackground   = @catBase
@disabledForeground   = @catOverlay1

@buttonBackground     = @catSurface0
@componentBackground  = @catMantle
@menuBackground       = @catMantle

@selectionBackground  = @catLavender
@selectionForeground  = @catBase
@selectionInactiveBackground = @catSurface1
@selectionInactiveForeground = @catText

@menuSelectionBackground          = @catLavender
@menuHoverBackground              = @catSurface0
@menuCheckBackground              = lighten(@catLavender,40%,derived noAutoInverse)
@menuAcceleratorForeground        = @catOverlay0
@menuAcceleratorSelectionForeground = @catBase

@cellFocusColor = darken(@catLavender,15%)
@icon           = @catOverlay2

@accentColor                    = @catMauve
@accentFocusColor               = @catMauve
@accentLinkColor                = @catBlue
@accentSelectionBackground      = @catLavender
@accentSliderColor              = @catMauve
@accentUnderlineColor           = @catMauve
@accentButtonDefaultBorderColor = @catMauve
@accentCheckmarkColor           = @catMauve

@buttonArrowColor         = @catSubtext0
@buttonDisabledArrowColor = @catOverlay0
@buttonHoverArrowColor    = @catSubtext1
@buttonPressedArrowColor  = @catText


#---- system colors ----

activeCaption    = @catSurface1
inactiveCaption  = @catSurface0


#---- Component ----

Component.borderColor         = @catSurface2
Component.disabledBorderColor = @catSurface1
Component.focusedBorderColor  = @catMauve
Component.focusColor          = @catMauve
Component.linkColor           = @catBlue
Component.accentColor         = @catMauve

Component.error.borderColor          = lighten(@catRed,40%)
Component.error.focusedBorderColor   = @catRed
Component.warning.borderColor        = lighten(@catYellow,30%)
Component.warning.focusedBorderColor = @catYellow
Component.success.borderColor        = lighten(@catGreen,40%)
Component.success.focusedBorderColor = @catGreen


#---- Button ----

Button.default.background      = @catMauve
Button.default.foreground      = @catBase
Button.default.hoverBackground = darken(@catMauve,5%,derived)
Button.default.pressedBackground = darken(@catMauve,10%,derived)
Button.default.borderColor     = @catMauve
Button.default.hoverBorderColor  = darken(@catMauve,5%,derived)
Button.default.focusedBorderColor = lighten(@catMauve,20%,derived)
Button.default.boldText = true


#---- CheckBox / RadioButton ----

CheckBox.icon.checkmarkColor               = @catMauve
CheckBox.icon.selectedBorderColor          = @catMauve
CheckBox.icon[filled].selectedBackground   = @catMauve
CheckBox.icon[filled].checkmarkColor       = @catBase

CheckBoxMenuItem.icon.checkmarkColor       = @catMauve


#---- Desktop ----

Desktop.background = @catMantle


#---- InternalFrame ----

InternalFrame.activeTitleBackground   = @catBase
InternalFrame.activeTitleForeground   = @catText
InternalFrame.inactiveTitleForeground = @catOverlay1
InternalFrame.activeBorderColor       = @catOverlay0
InternalFrame.inactiveBorderColor     = @catSurface2


#---- MenuBar ----

MenuBar.borderColor = @catSurface2


#---- PasswordField ----

PasswordField.capsLockIconColor = #4c4f6964
PasswordField.revealIconColor   = @catOverlay1


#---- Popup ----

Popup.dropShadowColor   = #4c4f69
Popup.dropShadowOpacity = 0.12


#---- PopupMenu ----

PopupMenu.borderColor = @catSurface2


#---- ProgressBar ----

ProgressBar.background = @catSurface1
ProgressBar.foreground = @catMauve


#---- ScrollBar ----

ScrollBar.track            = @catMantle
ScrollBar.thumb            = @catSurface2
ScrollBar.hoverTrackColor  = @catCrust
ScrollBar.hoverThumbColor  = @catOverlay0
ScrollBar.pressedThumbColor = @catOverlay1


#---- Separator ----

Separator.foreground = @catSurface1


#---- Slider ----

Slider.trackColor         = @catSurface1
Slider.disabledTrackColor = @catSurface0


#---- TabbedPane ----

TabbedPane.underlineColor         = @catMauve
TabbedPane.disabledUnderlineColor = @catSurface2


#---- Table ----

Table.gridColor = @catSurface0


#---- TableHeader ----

TableHeader.separatorColor       = @catSurface1
TableHeader.bottomSeparatorColor = @catSurface1


#---- TitlePane ----

TitlePane.embeddedForeground = @catSubtext0


#---- ToolTip ----

ToolTip.border     = 4,6,4,6,@catSurface2
ToolTip.background = @catMantle


#---- Tree ----

Tree.hash = @catSurface1
